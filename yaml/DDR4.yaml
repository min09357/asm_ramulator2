Frontend:
  impl: ReadWriteTrace
  path: ./traces/DDR4_2933Y_2R_Rowhit.trace
  clock_ratio: 1

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x4
      channel: 1
      rank: 2
    timing:
      preset: DDR4_2933Y

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: OpenRowPolicy
    plugins:

  AddrMapper:
    impl: ChRaBaRoCo