Frontend:
  impl: ReadWriteTraceO3
  path: ./traces/DDR4_2933Y_1R_Rowhit.trace
  clock_ratio: 1
  issue_window_size: 256

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x4
      channel: 1
      rank: 1
    timing:
      preset: DDR4_2933Y
      # nRAS: 
      # nRP: 
      # nRC: 
      # nCS: 

  Controller:
    # impl: Generic
    impl: PerRank
    read_buffer_size: 16
    write_buffer_size: 16
    scale_buffer_by_ranks: true
    max_read_per_rank: 0
    max_write_per_rank: 0
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      # impl: OpenRowPolicy
      impl: ClosedWithAutoPrecharge
    plugins:

  AddrMapper:
    impl: ChRaBaRoCo