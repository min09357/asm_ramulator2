Frontend:
  # impl: ReadWriteTraceO3
  impl: ReadWriteTrace
  path: ./traces/DDR4_2933Y_2R_Rowmiss.trace
  # path: ./traces/DDR4_2933Y_1R_Rowmiss.trace
  clock_ratio: 1
  issue_window_size: 256

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x4
      channel: 1
      rank: 2
    timing:
      preset: DDR4_2933Y
      # nRAS: 
      # nRP: 
      # nRC: 
      # nCS: 

  Controller:
    impl: Generic
    # impl: PerRank
    read_buffer_size: 128
    write_buffer_size: 64
    # scale_buffer_by_ranks: true
    scale_buffer_by_ranks: false
    max_read_per_rank: 0
    max_write_per_rank: 0
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      # impl: OpenRowPolicy
      impl: ClosedWithAutoPrecharge
    plugins:

  AddrMapper:
    impl: ChRaBaRoCo